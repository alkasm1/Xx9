<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM PointImage – شبكة بكسلات</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  color: #222;
  margin: 0;
  padding: 0;
}
header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}
button:hover {
  background: #0a8c6c;
}
textarea, input[type="file"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}
#canvasWrapper {
  margin-top: 20px;
  text-align: center;
}
#outputText {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  min-height: 80px;
  white-space: pre-wrap;
}
</style>
</head>

<body>

<header>ALM PointImage – شبكة بكسلات</header>

<div class="container">

  <h3>1) تحويل النص إلى صورة نقاط</h3>
  <textarea id="inputText" rows="6" placeholder="اكتب نصًا هنا..."></textarea>
  <button onclick="encodeToImage()">تحويل إلى صورة نقاط</button>

  <div id="canvasWrapper">
    <canvas id="pointCanvas"></canvas>
    <button onclick="saveImage()">حفظ الصورة (PNG)</button>
  </div>

  <hr>

  <h3>2) فك التشفير من صورة نقاط</h3>
  <input type="file" id="imageInput" accept="image/png">
  <button onclick="decodeFromImage()">فك التشفير</button>

  <h4>النص المستعاد:</h4>
  <div id="outputText"></div>

</div>

<script>
/* ===================== CRC32 ===================== */
function crc32(bytes) {
  let crc = ~0;
  for (let i = 0; i < bytes.length; i++) {
    crc ^= bytes[i];
    for (let j = 0; j < 8; j++) {
      crc = (crc >>> 1) ^ (0xEDB88320 & -(crc & 1));
    }
  }
  return (~crc) >>> 0;
}

/* ===================== UTF-8 ===================== */
function textToBytes(str) {
  return Array.from(new TextEncoder().encode(str));
}
function bytesToText(bytes) {
  return new TextDecoder().decode(new Uint8Array(bytes));
}

/* ===================== 32-bit helpers ===================== */
function intToBytes32(n) {
  return [
    (n >>> 24) & 0xFF,
    (n >>> 16) & 0xFF,
    (n >>> 8) & 0xFF,
    n & 0xFF
  ];
}
function bytesToInt32(b0, b1, b2, b3) {
  return ((b0 << 24) >>> 0) | (b1 << 16) | (b2 << 8) | b3;
}

/* ===================== ENCODE ===================== */
function encodeToImage() {
  const text = document.getElementById("inputText").value;
  if (!text.trim()) {
    alert("أدخل نصًا أولاً.");
    return;
  }

  let data = textToBytes(text);
  const length = data.length;

  // CRC
  const crc = crc32(data);
  const crcBytes = intToBytes32(crc);

  // Header: length (4 bytes) + length (4 bytes)
  const header = intToBytes32(length).concat(intToBytes32(length));

  // Combine: header + crc + data
  let allBytes = header.concat(crcBytes, data);

  // Padding to multiple of 3
  while (allBytes.length % 3 !== 0) allBytes.push(0);

  const bytesPerPixel = 3;
  const totalPixels = allBytes.length / bytesPerPixel;

  const width = 256;
  const height = Math.ceil(totalPixels / width);

  const canvas = document.getElementById("pointCanvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");

  const imageData = ctx.createImageData(width, height);
  const px = imageData.data;

  let bi = 0;
  for (let i = 0; i < totalPixels; i++) {
    const p = i * 4;
    px[p]     = allBytes[bi++] || 0;
    px[p + 1] = allBytes[bi++] || 0;
    px[p + 2] = allBytes[bi++] || 0;
    px[p + 3] = 255;
  }

  ctx.putImageData(imageData, 0, 0);
  alert("تم إنشاء صورة نقاط بنجاح.");
}

/* ===================== SAVE ===================== */
function saveImage() {
  const canvas = document.getElementById("pointCanvas");
  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = "alm-pointimage.png";
  a.click();
}

/* ===================== DECODE ===================== */
function decodeFromImage() {
  const file = document.getElementById("imageInput").files[0];
  if (!file) {
    alert("اختر صورة PNG أولاً.");
    return;
  }

  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById("pointCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;

    const bytes = [];
    for (let i = 0; i < data.length; i += 4) {
      bytes.push(data[i], data[i+1], data[i+2]);
    }

    // Read header
    const len1 = bytesToInt32(bytes[0], bytes[1], bytes[2], bytes[3]);
    const len2 = bytesToInt32(bytes[4], bytes[5], bytes[6], bytes[7]);

    if (len1 !== len2) {
      alert("خطأ في الرأس – الصورة تالفة.");
      return;
    }

    const length = len1;

    // CRC
    const crcStored = bytesToInt32(bytes[8], bytes[9], bytes[10], bytes[11]);

    const payload = bytes.slice(12, 12 + length);

    if (payload.length < length) {
      alert("البيانات ناقصة.");
      return;
    }

    const crcCalc = crc32(payload);
    if (crcCalc !== crcStored) {
      alert("CRC غير مطابق – الصورة تالفة.");
      return;
    }

    const text = bytesToText(payload);
    document.getElementById("outputText").textContent = text;
  };

  img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>

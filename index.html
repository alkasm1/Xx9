<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ALM PointImage – تحويل النص إلى صورة نقاط</title>

<style>
body {
  font-family: "Cairo", sans-serif;
  background: #ffffff;
  color: #222;
  margin: 0;
  padding: 0;
}
header {
  background: #0BA37F;
  color: white;
  padding: 15px;
  text-align: center;
  font-size: 22px;
  font-weight: bold;
}
.container {
  padding: 20px;
  max-width: 700px;
  margin: auto;
}
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #0BA37F;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 17px;
  cursor: pointer;
}
button:hover {
  background: #0a8c6c;
}
textarea, input[type="file"] {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  font-size: 16px;
}
#canvasWrapper {
  margin-top: 20px;
  text-align: center;
}
#outputText {
  margin-top: 15px;
  padding: 10px;
  border: 1px solid #ccc;
  border-radius: 8px;
  min-height: 80px;
  white-space: pre-wrap;
}
.small {
  font-size: 13px;
  color: #666;
  margin-top: 5px;
  text-align: center;
}
</style>
</head>

<body>

<header>ALM PointImage – تمثيل النص كصورة نقاط</header>

<div class="container">

  <h3>1) تحويل النص إلى صورة نقاط</h3>
  <textarea id="inputText" rows="6" placeholder="اكتب نصًا أو الصق جزءًا من كتاب هنا..."></textarea>
  <button onclick="encodeToImage()">تحويل إلى صورة نقاط</button>

  <div id="canvasWrapper">
    <canvas id="pointCanvas"></canvas>
    <div class="small">الصورة الناتجة تمثل النص كنقاط بكسلية.</div>
    <button onclick="saveImage()">حفظ الصورة في المعرض (ملف PNG)</button>
  </div>

  <hr>

  <h3>2) فك التشفير من صورة نقاط</h3>
  <label>اختر صورة (PNG) تم توليدها من النظام:</label>
  <input type="file" id="imageInput" accept="image/*">
  <button onclick="decodeFromImage()">فك التشفير من الصورة</button>

  <h4>النص المستعاد:</h4>
  <div id="outputText"></div>

</div>

<script>
// ترميز النص إلى بايتات (UTF-8)
function textToBytes(str) {
  const encoder = new TextEncoder();
  return Array.from(encoder.encode(str));
}

// فك البايتات إلى نص (UTF-8)
function bytesToText(bytes) {
  const decoder = new TextDecoder();
  return decoder.decode(new Uint8Array(bytes));
}

// تحويل عدد صحيح 32-بت إلى 4 بايت (Big-endian)
function intToBytes32(n) {
  return [
    (n >>> 24) & 0xFF,
    (n >>> 16) & 0xFF,
    (n >>> 8) & 0xFF,
    n & 0xFF
  ];
}

// تحويل 4 بايت إلى عدد 32-بت (Big-endian)
function bytesToInt32(b0, b1, b2, b3) {
  return ((b0 << 24) >>> 0) | (b1 << 16) | (b2 << 8) | b3;
}

// ترميز النص إلى صورة نقاط
function encodeToImage() {
  const text = document.getElementById("inputText").value || "";
  if (!text.trim()) {
    alert("الرجاء إدخال نص أولاً.");
    return;
  }

  // 1) نص → بايتات
  const dataBytes = textToBytes(text);
  const length = dataBytes.length;

  // 2) إضافة رأس (4 بايت لطول البيانات)
  const headerBytes = intToBytes32(length);
  const allBytes = headerBytes.concat(dataBytes);

  // 3) كل بكسل يحمل 3 بايت (R,G,B) – A ثابت 255
  const bytesPerPixel = 3;
  const totalPixels = Math.ceil(allBytes.length / bytesPerPixel);

  // نختار عرض ثابت مثلاً 256 بكسل
  const width = 256;
  const height = Math.ceil(totalPixels / width);

  const canvas = document.getElementById("pointCanvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");

  const imageData = ctx.createImageData(width, height);
  const data = imageData.data;

  let byteIndex = 0;
  for (let i = 0; i < totalPixels; i++) {
    const pixelIndex = i * 4; // RGBA
    const r = allBytes[byteIndex++] || 0;
    const g = allBytes[byteIndex++] || 0;
    const b = allBytes[byteIndex++] || 0;

    data[pixelIndex]     = r;
    data[pixelIndex + 1] = g;
    data[pixelIndex + 2] = b;
    data[pixelIndex + 3] = 255; // Alpha
  }

  ctx.putImageData(imageData, 0, 0);
  alert(`تم توليد صورة نقاط بنجاح.\nالأبعاد: ${width} × ${height}`);
}

// حفظ الصورة كـ PNG
function saveImage() {
  const canvas = document.getElementById("pointCanvas");
  if (!canvas.width || !canvas.height) {
    alert("لا توجد صورة حالية للحفظ.");
    return;
  }
  const url = canvas.toDataURL("image/png");
  const a = document.createElement("a");
  a.href = url;
  a.download = "alm-pointimage.png";
  a.click();
}

// فك التشفير من صورة
function decodeFromImage() {
  const fileInput = document.getElementById("imageInput");
  const file = fileInput.files[0];
  if (!file) {
    alert("الرجاء اختيار صورة أولاً.");
    return;
  }

  const img = new Image();
  img.onload = () => {
    const canvas = document.getElementById("pointCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = img.width;
    canvas.height = img.height;
    ctx.drawImage(img, 0, 0);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;

    const bytes = [];
    for (let i = 0; i < data.length; i += 4) {
      bytes.push(data[i]);     // R
      bytes.push(data[i + 1]); // G
      bytes.push(data[i + 2]); // B
    }

    if (bytes.length < 4) {
      alert("الصورة لا تحتوي بيانات كافية.");
      return;
    }

    const length = bytesToInt32(bytes[0], bytes[1], bytes[2], bytes[3]);
    const payload = bytes.slice(4, 4 + length);

    if (payload.length < length) {
      alert("البيانات ناقصة أو الصورة تالفة.");
      return;
    }

    const text = bytesToText(payload);
    document.getElementById("outputText").textContent = text;
  };

  img.onerror = () => {
    alert("تعذر قراءة الصورة.");
  };

  img.src = URL.createObjectURL(file);
}
</script>

</body>
</html>
